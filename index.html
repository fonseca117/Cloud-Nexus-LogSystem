<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Nexus | Jose Martinez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <main x-data="{ 
            logs: [],
            inputValue: '',
            isLoading: false,
            
            async addLog() {
                if (!this.inputValue.trim()) return;
                this.isLoading = true;
                
                // URL DE TU TUNEL NGROK ACTUAL
                const url = 'https://unmonumental-touchily-meghann.ngrok-free.dev/guardar.php';

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'ngrok-skip-browser-warning': 'true' // Salta la advertencia de Ngrok para Vercel
                        },
                        body: JSON.stringify({ mensaje: this.inputValue })
                    });

                    if (response.ok) {
                        this.logs.unshift({ 
                            id: Date.now(), 
                            text: this.inputValue, 
                            time: new Date().toLocaleTimeString() 
                        });
                        this.inputValue = '';
                    } else { 
                        throw new Error('Respuesta no exitosa'); 
                    }
                } catch (e) {
                    alert('Error: No se pudo conectar con el servidor Ubuntu');
                    console.error(e);
                } finally {
                    this.isLoading = false;
                }
            }
        }" class="w-full max-w-md bg-white border rounded-[2rem] shadow-xl overflow-hidden">
        
        <header class="bg-slate-900 p-8 text-white text-center">
            <h1 class="text-3xl font-black italic">Cloud-Nexus</h1>
            <p class="text-xs text-slate-400">Infraestructura IaaS - Jose Martinez</p>
        </header>

        <section class="p-8 pb-4">
            <input type="text" x-model="inputValue" @keydown.enter="addLog" placeholder="Escribir registro..." 
                   class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none focus:border-blue-500">
            
            <button @click="addLog" :disabled="isLoading || !inputValue.trim()" 
                    class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all flex justify-center items-center gap-2">
                <span x-show="!isLoading">Registrar Evento</span>
                <span x-show="isLoading" class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Sincronizando...
                </span>
            </button>
        </section>

        <section class="px-8 pb-8 pt-4">
            <div class="space-y-3 max-h-[200px] overflow-y-auto">
                <template x-for="log in logs" :key="log.id">
                    <div class="p-3 bg-slate-50 border-l-4 border-blue-500 rounded-r-lg">
                        <span class="text-[10px] text-slate-400" x-text="log.time"></span>
                        <p class="text-sm font-semibold" x-text="log.text"></p>
                    </div>
                </template>
                <div x-show="logs.length === 0" class="text-center text-slate-400 text-xs py-4">
                    No hay eventos registrados
                </div>
            </div>
        </section>
    </main>
</body>
</html>
