<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Nexus | Enterprise Log System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans antialiased text-slate-800">

    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-100/50 blur-[120px]"></div>
    </div>

    <main x-data="{ 
            logs: [],
            inputValue: '',
            isLoading: false,
            // IMPORTANTE: Si usas Vercel, esta IP debe ser tu IP PÚBLICA o usar un Túnel
            serverUrl: 'http://192.168.0.108/guardar.php', 
            
            async addLog() {
                if (!this.inputValue.trim()) return;
                this.isLoading = true;
                const texto = this.inputValue;
                const timeStr = new Date().toLocaleTimeString();

                try {
                    const response = await fetch(this.serverUrl, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mensaje: texto })
                    });

                    if (response.ok) {
                        this.logs.unshift({ id: Date.now(), text: texto, type: 'success', time: timeStr });
                        this.inputValue = '';
                    } else { throw new Error(); }
                } catch (err) {
                    alert('Error: La web en GitHub/Vercel no puede ver tu IP local 192.168.0.108. Lee las instrucciones de la terminal.');
                    this.logs.unshift({ id: Date.now(), text: 'FALLO DE RED: ' + texto, type: 'info', time: timeStr });
                } finally {
                    this.isLoading = false;
                    setTimeout(() => lucide.createIcons(), 50);
                }
            }
        }"
        class="relative w-full max-w-md bg-white border border-slate-200 rounded-[2rem] shadow-xl overflow-hidden"
    >
        <header class="bg-slate-900 p-8 text-white">
            <h1 class="text-3xl font-black italic">Cloud-Nexus</h1>
            <p class="text-blue-400 text-xs mt-2 uppercase tracking-widest">Infraestructura IaaS conectada</p>
        </header>

        <section class="p-8">
            <input type="text" x-model="inputValue" @keydown.enter="addLog" placeholder="Escribe un log para Ubuntu..." 
                class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            
            <button @click="addLog" :disabled="isLoading || !inputValue.trim()"
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all">
                <span x-show="!isLoading">Registrar en Servidor</span>
                <span x-show="isLoading">Sincronizando...</span>
            </button>
        </section>

        <section class="px-8 pb-8">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4">Logs Recientes</h2>
            <div class="space-y-3 max-h-40 overflow-y-auto custom-scrollbar">
                <template x-for="log in logs" :key="log.id">
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-100 flex justify-between">
                        <span class="text-sm font-medium" x-text="log.text"></span>
                        <span class="text-[10px] text-slate-400" x-text="log.time"></span>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
