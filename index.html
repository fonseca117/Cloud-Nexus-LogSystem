<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Nexus | Sistema de Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="min-h-screen bg-[#f8fafc] flex items-center justify-center p-4 font-sans text-slate-800 selection:bg-blue-100">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-blue-50 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-indigo-50 blur-[120px]"></div>
    </div>

    <div class="relative w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden animate__animated animate__fadeInUp">
        
        <div class="bg-slate-900 p-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-2">
                    <div class="p-2 bg-blue-500 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span class="text-xs font-bold uppercase tracking-widest text-blue-400">Cloud Platform</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Cloud-Nexus</h1>
                <p class="text-slate-400 text-sm mt-1 flex items-center gap-2">Sistema de Logs en Tiempo Real</p>
            </div>
        </div>

        <div class="p-8 pb-4">
            <form id="logForm" class="space-y-4">
                <div class="relative group">
                    <label class="text-xs font-semibold text-slate-500 uppercase ml-1 mb-2 block">Nuevo Evento</label>
                    <input type="text" id="logInput" placeholder="Describa la acción del sistema..." 
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm" required>
                </div>
                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <span>Registrar Entrada</span>
                </button>
            </form>
        </div>

        <div class="px-8 pb-8 pt-4 border-t border-slate-50 mt-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold text-slate-700 uppercase tracking-tighter">Actividad Reciente</h2>
                <button onclick="document.getElementById('logList').innerHTML = ''" class="text-slate-400 hover:text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                </button>
            </div>
            <div id="logList" class="space-y-3 max-h-[250px] overflow-y-auto pr-2">
                </div>
        </div>
        
        <div class="bg-slate-50 px-8 py-3 flex justify-between items-center text-[10px] text-slate-400 font-semibold uppercase tracking-widest border-t border-slate-100">
            <span>Status: Online</span>
            <span>v2.4.0</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('logForm');
        const list = document.getElementById('logList');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('logInput');
            
            // Simular carga profesional
            btn.innerHTML = 'Cargando...';
            btn.disabled = true;

            setTimeout(() => {
                const div = document.createElement('div');
                div.className = "flex items-start gap-3 p-3 rounded-xl bg-slate-50 border border-slate-100 animate__animated animate__fadeInLeft";
                div.innerHTML = `
                    <div class="mt-1 h-2 w-2 rounded-full shrink-0 bg-blue-500"></div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-[10px] text-slate-400 font-mono">${new Date().toLocaleTimeString()}</p>
                        <p class="text-sm text-slate-700 leading-relaxed break-words">${input.value}</p>
                    </div>
                `;
                list.prepend(div);
                input.value = '';
                btn.innerHTML = 'Registrar Entrada';
                btn.disabled = false;
            }, 600);
        };
    </script>
</body>
</html>
